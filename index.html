<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>算命仙人 - 你是哪种摆烂仙人</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            touch-action: pan-y;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fef9f3 0%, #fdf6e9 50%, #faf3e3 100%);
            color: #4a4a4a;
        }

        /* 粒子画布 */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* 页面容器 */
        .app {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* ========== 首页 ========== */
        #home-page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 10;
        }

        #home-page.hidden {
            display: none;
        }

        .home-content {
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .emoji-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .title {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 10px;
            color: #3a3a3a;
        }

        .subtitle {
            font-size: 16px;
            color: rgba(100, 100, 100, 0.8);
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        .start-btn {
            padding: 16px 50px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(230, 126, 34, 0.3);
        }

        /* ========== 答题页 ========== */
        #question-page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 5;
            overflow: hidden;
        }

        #question-page.active {
            display: block;
        }

        /* 滑动容器 */
        .slide-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* 单个题目页 */
        .slide-page {
            min-width: 100%;
            height: 100%;
            padding: 60px 20px 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fef9f3 0%, #fdf6e9 50%, #faf3e3 100%);
        }

        .question-content {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(200, 180, 150, 0.3);
            border-radius: 2px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e67e22, #f39c12);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .question-number {
            font-size: 14px;
            color: rgba(100, 100, 100, 0.6);
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 22px;
            margin-bottom: 35px;
            line-height: 1.5;
            font-weight: 600;
            color: #3a3a3a;
            text-align: center;
        }

        /* 选项 */
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 450px;
        }

        .option {
            padding: 18px 24px;
            font-size: 16px;
            border: 2px solid rgba(200, 180, 150, 0.4);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.9);
            color: #5a5a5a;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }

        .option:active {
            transform: scale(0.98);
        }

        .option.selected {
            background: linear-gradient(135deg, rgba(230, 126, 34, 0.15), rgba(211, 84, 0, 0.1));
            border-color: #e67e22;
            color: #c05700;
            transform: scale(1.02);
        }

        /* 底部提示 */
        .next-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            text-align: center;
        }

        .next-hint.show {
            opacity: 1;
            pointer-events: auto;
        }

        .next-hint-text {
            font-size: 13px;
            color: rgba(100, 100, 100, 0.6);
            margin-bottom: 8px;
        }

        .next-arrow {
            animation: arrowBounce 1s ease-in-out infinite;
        }

        .next-arrow span {
            font-size: 24px;
            color: #e67e22;
        }

        @keyframes arrowBounce {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(8px); }
        }

        .view-result-btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: 2px solid #e67e22;
            border-radius: 25px;
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: #fff;
            cursor: pointer;
        }

        /* ========== 结果页 ========== */
        #result-page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
            overflow-y: auto;
            background: linear-gradient(135deg, #fef9f3 0%, #fdf6e9 50%, #faf3e3 100%);
        }

        #result-page.active {
            opacity: 1;
            pointer-events: auto;
        }

        .result-content {
            text-align: center;
            width: 90%;
            max-width: 450px;
            padding: 20px 0;
        }

        .result-badge {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(230, 126, 34, 0.15);
            border-radius: 20px;
            font-size: 14px;
            color: #c05700;
            margin-bottom: 20px;
        }

        .result-type {
            font-size: 60px;
            margin-bottom: 10px;
            animation: popIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-title {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 25px;
            color: #3a3a3a;
            animation: slideUp 0.5s ease 0.2s both;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .result-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 25px;
            border: 1px solid rgba(200, 180, 150, 0.3);
            text-align: left;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            animation: slideUp 0.5s ease 0.4s both;
        }

        .result-desc {
            font-size: 16px;
            line-height: 1.8;
            color: #5a5a5a;
        }

        .result-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        .result-tag {
            padding: 8px 16px;
            background: rgba(230, 126, 34, 0.1);
            border-radius: 20px;
            font-size: 14px;
            color: #c05700;
            animation: tagIn 0.4s ease both;
        }

        @keyframes tagIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            animation: slideUp 0.5s ease 0.6s both;
        }

        .share-btn {
            padding: 16px;
            font-size: 17px;
            font-weight: bold;
            border: none;
            border-radius: 16px;
            background: #25D366;
            color: #fff;
            cursor: pointer;
        }

        .retry-btn {
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border: 2px solid rgba(200, 180, 150, 0.5);
            border-radius: 16px;
            background: transparent;
            color: #5a5a5a;
            cursor: pointer;
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            .title {
                font-size: 34px;
            }

            .question-text {
                font-size: 20px;
            }

            .result-type {
                font-size: 50px;
            }

            .result-title {
                font-size: 24px;
            }

            .emoji-icon {
                font-size: 60px;
            }

            .slide-page {
                padding: 50px 15px 90px;
            }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>

    <div class="app">
        <!-- 首页 -->
        <div id="home-page">
            <div class="home-content">
                <div class="emoji-icon">🔮</div>
                <h1 class="title">算命仙人</h1>
                <p class="subtitle">你是哪种摆烂仙人？</p>
                <button class="start-btn" onclick="startTest()">开始测试</button>
            </div>
        </div>

        <!-- 答题页 -->
        <div id="question-page">
            <div class="slide-container" id="slide-container">
                <!-- 动态生成题目 -->
            </div>
            <!-- 底部提示 -->
            <div class="next-hint" id="next-hint">
                <div class="next-hint-text">已选，滑动翻页</div>
                <div class="next-arrow"><span>→</span></div>
            </div>
        </div>

        <!-- 结果页 -->
        <div id="result-page">
            <div class="result-content">
                <div class="result-badge">✨ 仙人掐指一算 ✨</div>
                <div class="result-type" id="result-type"></div>
                <h2 class="result-title" id="result-title"></h2>
                <div class="result-card">
                    <p class="result-desc" id="result-desc"></p>
                    <div class="result-tags" id="result-tags"></div>
                </div>
                <div class="btn-group">
                    <button class="share-btn" onclick="shareResult()">📱 发给朋友比惨</button>
                    <button class="retry-btn" onclick="retry()">再摆一次烂</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== 粒子效果 ==========
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(230, 126, 34, ${this.opacity})`;
                ctx.fill();
            }
        }

        for (let i = 0; i < 25; i++) particles.push(new Particle());

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ========== 数据 ==========
        const questions = [
            { text: "周六早上10点，你的自然醒时间是？", options: ["已经醒了，在焦虑下周工作", "睡到下午才是对周末的尊重", "8点就醒，卷王体质", "管他几点，饿醒为止"] },
            { text: "朋友圈看到同学又晒升职，你第一反应是？", options: ["点个赞，心里MMP", "划走，假装没看到", "评论区：恭喜！", "开始刷招聘软件"] },
            { text: "领导晚上9点发消息，你会？", options: ["已读不回，明天再说", "秒回：好的收到！", "回：在忙，晚点联系", "直接装睡"] },
            { text: "你买过最后悔的东西是？", options: ["健身卡，一次没去过", "囤的课，听了三节", "那件等瘦了再穿的衣服", "没后悔过，我很理智"] },
            { text: "朋友约你出去玩，你的真实想法是？", options: ["在家躺着不香吗", "去！必须去！难得出门", "看心情，看天气", "去可以，但你得请客"] },
            { text: "半夜睡不着，你通常在想什么？", options: ["人生的意义是什么", "明天又要上班...", "明天吃啥", "想不通的事太多了"] }
        ];

        const results = [
            { emoji: "🛋️", title: "你是「摆烂仙人」", desc: "躺平是你的信仰，摆烂是你的日常。你的人生格言是：能躺着绝不坐着，能摆烂绝不挣扎。仙人曰：你已得躺平真传，此乃大智慧也。", tags: ["躺平大师", "精神离职", "周末战神"] },
            { emoji: "💪", title: "你是「卷王仙人」", desc: "嘴上说着摆烂，身体却很诚实。你是那种躺在床上刷招聘信息、焦虑到睡不着的人。仙人曰：你卷的不是工作，是那颗不安的心。", tags: ["间歇性踌躇", "持续性焦虑", "隐形卷王"] },
            { emoji: "😶", title: "你是「精神离职仙人」", desc: "人在工位，魂已下班。你的身体在开会，灵魂在神游。工作是给老板做的，但脑子是自己的。", tags: ["身体在场", "灵魂出窍", "带薪摸鱼"] },
            { emoji: "🙈", title: "你是「社恐仙人」", desc: "你的社交能量是有限的，用完就得回家充电。朋友聚会能不去就不去，群消息能不看就不看。", tags: ["已读不回", "在线隐身", "独处充电"] },
            { emoji: "🗣️", title: "你是「嘴强王者」", desc: "理论大师，实操青铜。你能写出一万字躺平指南，却还是在焦虑中卷生卷死。仙人曰：想太多，做太少。", tags: ["想法巨人", "行动矮子", "内心戏王"] },
            { emoji: "🧘", title: "你是「通透仙人」", desc: "你已经看透了一切，也接受了一切。你不卷不摆，不焦虑不佛系，主打一个顺其自然。仙人曰：你已修炼到无欲无求的境界。", tags: ["看透一切", "顺其自然", "人间清醒"] }
        ];

        // ========== 状态 ==========
        let current = 0;
        let selectedOption = -1;
        let answers = [];
        let isAnimating = false;
        let isDragging = false;
        let startX = 0;
        let currentX = 0;

        const slideContainer = document.getElementById('slide-container');
        const questionPage = document.getElementById('question-page');
        const nextHint = document.getElementById('next-hint');

        // ========== 初始化 ==========
        function startTest() {
            current = 0;
            selectedOption = -1;
            answers = [];

            document.getElementById('home-page').classList.add('hidden');
            generateSlides();
            questionPage.classList.add('active');
            updateUI();
        }

        function generateSlides() {
            slideContainer.innerHTML = '';
            slideContainer.style.transform = 'translateX(0)';

            questions.forEach((q, index) => {
                const slide = document.createElement('div');
                slide.className = 'slide-page';
                slide.dataset.index = index;

                const shuffled = [0, 1, 2, 3].sort(() => Math.random() - 0.5);

                slide.innerHTML = `
                    <div class="question-content">
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${((index + 1) / questions.length) * 100}%"></div>
                        </div>
                        <div class="question-number">第 ${index + 1} 题</div>
                        <div class="question-text">${q.text}</div>
                        <div class="options">
                            ${q.options.map((opt, i) => `
                                <button class="option" data-option="${shuffled[i]}">${opt}</button>
                            `).join('')}
                        </div>
                    </div>
                `;

                slideContainer.appendChild(slide);
            });

            // 绑定选项点击
            document.querySelectorAll('.option').forEach(btn => {
                btn.addEventListener('click', handleOptionClick);
            });
        }

        function handleOptionClick(e) {
            if (isAnimating) return;

            const slide = e.target.closest('.slide-page');
            const slideIndex = parseInt(slide.dataset.index);

            // 同一题内取消其他选中
            slide.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));

            const optionIndex = parseInt(e.target.dataset.option);

            // toggle
            if (selectedOption === optionIndex) {
                selectedOption = -1;
            } else {
                selectedOption = optionIndex;
                e.target.classList.add('selected');
            }

            // 如果点击的是当前页，更新提示
            if (slideIndex === current) {
                updateHint();
            }
        }

        function updateHint() {
            if (current === questions.length - 1) {
                // 最后一题
                if (selectedOption >= 0) {
                    nextHint.innerHTML = '<button class="view-result-btn" onclick="goToResult()">查看结果</button>';
                    nextHint.classList.add('show');
                } else {
                    nextHint.classList.remove('show');
                }
            } else {
                // 非最后一题
                if (selectedOption >= 0) {
                    nextHint.innerHTML = `
                        <div class="next-hint-text">已选，滑动翻页</div>
                        <div class="next-arrow"><span>→</span></div>
                    `;
                    nextHint.classList.add('show');
                } else {
                    nextHint.classList.remove('show');
                }
            }
        }

        function updateUI() {
            // 更新滑动位置
            slideContainer.style.transform = `translateX(${-current * 100}%)`;
            // 重置选中状态
            selectedOption = answers[current] !== undefined ? answers[current] : -1;

            // 更新选项选中状态
            const currentSlide = slideContainer.children[current];
            if (currentSlide) {
                currentSlide.querySelectorAll('.option').forEach(opt => {
                    if (parseInt(opt.dataset.option) === selectedOption) {
                        opt.classList.add('selected');
                    } else {
                        opt.classList.remove('selected');
                    }
                });
            }

            updateHint();
        }

        // ========== 滑动翻页 ==========
        function goToNext() {
            if (isAnimating || selectedOption < 0 || current >= questions.length - 1) return;
            isAnimating = true;

            answers[current] = selectedOption;
            current++;
            selectedOption = -1;

            slideContainer.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            slideContainer.style.transform = `translateX(${-current * 100}%)`;

            setTimeout(() => {
                isAnimating = false;
                selectedOption = answers[current] !== undefined ? answers[current] : -1;
                updateHint();
            }, 400);
        }

        function goToPrev() {
            if (isAnimating || current <= 0) return;
            isAnimating = true;

            current--;
            selectedOption = answers[current] !== undefined ? answers[current] : -1;

            slideContainer.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            slideContainer.style.transform = `translateX(${-current * 100}%)`;

            setTimeout(() => {
                isAnimating = false;
                updateHint();
            }, 400);
        }

        function goToResult() {
            if (isAnimating) return;
            isAnimating = true;

            answers[current] = selectedOption;

            // 隐藏答题页，显示结果页
            questionPage.classList.remove('active');

            setTimeout(() => {
                const resultPage = document.getElementById('result-page');
                resultPage.classList.add('active');

                const score = answers.reduce((a, b) => a + b, 0);
                const result = results[score % results.length];

                document.getElementById('result-type').textContent = result.emoji;
                document.getElementById('result-title').textContent = result.title;
                document.getElementById('result-desc').textContent = result.desc;

                const tagsContainer = document.getElementById('result-tags');
                tagsContainer.innerHTML = '';
                result.tags.forEach((t, i) => {
                    const tag = document.createElement('span');
                    tag.className = 'result-tag';
                    tag.textContent = '# ' + t;
                    tag.style.animationDelay = `${0.5 + i * 0.1}s`;
                    tagsContainer.appendChild(tag);
                });

                isAnimating = false;
            }, 300);
        }

        // ========== 触摸事件 ==========
        let touchStartX = 0;
        let touchStartY = 0;
        let touchCurrentX = 0;
        let dragStartTime = 0;
        let hasMoved = false;

        questionPage.addEventListener('touchstart', (e) => {
            if (isAnimating) return;
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            touchCurrentX = touchStartX;
            dragStartTime = Date.now();
            hasMoved = false;
            isDragging = true;

            slideContainer.style.transition = 'none';
        }, { passive: true });

        questionPage.addEventListener('touchmove', (e) => {
            if (!isDragging || isAnimating) return;

            const currentX = e.touches[0].clientX;
            const currentY = e.touches[0].clientY;
            const deltaX = currentX - touchStartX;
            const deltaY = currentY - touchStartY;

            // 区分水平滑动和垂直滑动
            if (!hasMoved) {
                if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > 10) {
                    isDragging = false;
                    return;
                }
                hasMoved = true;
            }

            touchCurrentX = currentX;

            // 限制滑动范围
            let offset = -current * window.innerWidth + deltaX;
            const maxLeft = -(questions.length - 1) * window.innerWidth;

            // 左滑限制
            if (offset < maxLeft) {
                offset = maxLeft + (offset - maxLeft) * 0.3;
            }
            // 右滑限制
            if (offset > 0) {
                offset = offset * 0.3;
            }

            slideContainer.style.transform = `translateX(${offset}px)`;
        }, { passive: true });

        questionPage.addEventListener('touchend', () => {
            if (!isDragging) return;
            isDragging = false;

            const deltaX = touchCurrentX - touchStartX;
            const deltaTime = Date.now() - dragStartTime;
            const velocity = Math.abs(deltaX) / deltaTime;
            const threshold = window.innerWidth / 3;

            // 最后一题只能右滑返回
            if (current === questions.length - 1) {
                if (deltaX > threshold || (deltaX > 30 && velocity > 0.3)) {
                    goToPrev();
                } else {
                    snapBack();
                }
                return;
            }

            // 判断滑动方向和距离
            if (deltaX < -threshold || (deltaX < -50 && velocity > 0.4)) {
                // 左滑 - 下一页（需要已选）
                if (selectedOption >= 0) {
                    goToNext();
                } else {
                    snapBack();
                }
            } else if (deltaX > threshold || (deltaX > 50 && velocity > 0.4)) {
                // 右滑 - 上一页
                goToPrev();
            } else {
                snapBack();
            }
        });

        function snapBack() {
            isAnimating = true;
            slideContainer.style.transition = 'transform 0.3s ease';
            slideContainer.style.transform = `translateX(${-current * 100}%)`;

            setTimeout(() => {
                isAnimating = false;
            }, 300);
        }

        // ========== 键盘支持 ==========
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                if (selectedOption >= 0 && current < questions.length - 1) {
                    goToNext();
                } else if (current === questions.length - 1 && selectedOption >= 0) {
                    goToResult();
                }
            } else if (e.key === 'ArrowLeft') {
                goToPrev();
            } else if (e.key === 'Enter' && selectedOption >= 0) {
                if (current < questions.length - 1) {
                    goToNext();
                } else {
                    goToResult();
                }
            }
        });

        // ========== 分享 & 重试 ==========
        function shareResult() {
            const title = document.getElementById('result-title').textContent;
            const text = `🔮 刚测了「算命仙人」，我是${title}！\n\n你也来试试？👇\nhttps://israel-rain.github.io/suanming/`;

            if (navigator.share) {
                navigator.share({ title: '算命仙人', text });
            } else {
                navigator.clipboard.writeText(text).then(() => {
                    alert('已复制到剪贴板！快去朋友圈发吧~');
                });
            }
        }

        function retry() {
            const resultPage = document.getElementById('result-page');
            resultPage.classList.remove('active');
            questionPage.classList.remove('active');

            setTimeout(() => {
                document.getElementById('home-page').classList.remove('hidden');
            }, 300);
        }

        // ========== 窗口大小变化 ==========
        window.addEventListener('resize', () => {
            resizeCanvas();
            if (questionPage.classList.contains('active')) {
                slideContainer.style.transition = 'none';
                slideContainer.style.transform = `translateX(${-current * 100}%)`;
            }
        });
    </script>
</body>
</html>
