<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>算命仙人 - 你是哪种摆烂仙人</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fef9f3 0%, #fdf6e9 50%, #faf3e3 100%);
            color: #4a4a4a;
        }

        /* 粒子画布 */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* 页面容器 */
        .app {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* ========== 首页 ========== */
        #home-page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 10;
        }

        #home-page.hidden {
            display: none;
        }

        .home-content {
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .emoji-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .title {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 10px;
            color: #3a3a3a;
        }

        .subtitle {
            font-size: 16px;
            color: rgba(100, 100, 100, 0.8);
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        .start-btn {
            padding: 16px 50px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(230, 126, 34, 0.3);
        }

        /* ========== 答题页 ========== */
        #question-page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 5;
            overflow: hidden;
        }

        #question-page.active {
            display: block;
        }

        /* 滑动容器 */
        .slide-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* 单个题目页 */
        .slide-page {
            min-width: 100%;
            height: 100%;
            padding: 60px 20px 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fef9f3 0%, #fdf6e9 50%, #faf3e3 100%);
        }

        .question-content {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(200, 180, 150, 0.3);
            border-radius: 2px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e67e22, #f39c12);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .question-number {
            font-size: 14px;
            color: rgba(100, 100, 100, 0.6);
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 22px;
            margin-bottom: 35px;
            line-height: 1.5;
            font-weight: 600;
            color: #3a3a3a;
            text-align: center;
        }

        /* 选项 */
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 450px;
        }

        .option {
            padding: 18px 24px;
            font-size: 16px;
            border: 2px solid rgba(200, 180, 150, 0.4);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.9);
            color: #5a5a5a;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }

        .option:active {
            transform: scale(0.98);
        }

        .option.selected {
            background: linear-gradient(135deg, rgba(230, 126, 34, 0.15), rgba(211, 84, 0, 0.1));
            border-color: #e67e22;
            color: #c05700;
            transform: scale(1.02);
        }

        /* ========== iOS风格滚筒选择器 (Q1) ========== */
        .wheel-picker-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .wheel-label {
            font-size: 18px;
            color: #c05700;
            margin-bottom: 20px;
            font-weight: 600;
        }

        /* 滚筒视窗 */
        .wheel-viewport {
            position: relative;
            width: 200px;
            height: 220px;
            overflow: hidden;
            border-radius: 16px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(200,180,150,0.3);
            box-shadow: 0 4px 20px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.8);
        }

        /* 上下渐变遮罩，模拟iOS选择效果 */
        .wheel-mask-top,
        .wheel-mask-bottom {
            position: absolute;
            left: 0;
            width: 100%;
            height: 80px;
            z-index: 5;
            pointer-events: none;
        }
        .wheel-mask-top {
            top: 0;
            background: linear-gradient(to bottom, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 100%);
        }
        .wheel-mask-bottom {
            bottom: 0;
            background: linear-gradient(to top, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0) 100%);
        }

        /* 选中指示线 */
        .wheel-selection-indicator {
            position: absolute;
            top: 50%;
            left: 8px;
            right: 8px;
            height: 48px;
            transform: translateY(-50%);
            border-radius: 12px;
            background: rgba(230, 126, 34, 0.12);
            border: 1.5px solid rgba(230, 126, 34, 0.35);
            z-index: 4;
            pointer-events: none;
        }

        /* 滚筒可拖动区域 */
        .wheel-scroll-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: grab;
            touch-action: none;
        }

        .wheel-scroll-area:active {
            cursor: grabbing;
        }

        /* 单个年份条目 */
        .wheel-item {
            position: absolute;
            left: 0;
            width: 100%;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: #bbb;
            transition: color 0.15s ease, opacity 0.15s ease;
            will-change: transform, opacity, color;
            pointer-events: none;
        }

        .wheel-item.selected {
            color: #c05700;
            font-size: 24px;
        }

        /* 提示文字 */
        .wheel-hint {
            margin-top: 12px;
            font-size: 13px;
            color: rgba(100,100,100,0.5);
            text-align: center;
        }

        .confirm-btn {
            margin-top: 20px;
            padding: 13px 40px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: #fff;
            cursor: pointer;
            opacity: 0.4;
            pointer-events: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(230,126,34,0.3);
        }

        .confirm-btn.active {
            opacity: 1;
            pointer-events: auto;
        }

        .confirm-btn:active {
            transform: scale(0.96);
            box-shadow: 0 2px 8px rgba(230,126,34,0.3);
        }

        /* 底部提示 */
        .next-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            text-align: center;
        }

        .next-hint.show {
            opacity: 1;
            pointer-events: auto;
        }

        .next-hint-text {
            font-size: 13px;
            color: rgba(100, 100, 100, 0.6);
            margin-bottom: 8px;
        }

        .next-arrow {
            animation: arrowBounce 1s ease-in-out infinite;
        }

        .next-arrow span {
            font-size: 24px;
            color: #e67e22;
        }

        @keyframes arrowBounce {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(8px); }
        }

        .view-result-btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: 2px solid #e67e22;
            border-radius: 25px;
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: #fff;
            cursor: pointer;
        }

        /* ========== 结果页 (支持上下滚动) ========== */
        #result-page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
            background: linear-gradient(135deg, #fef9f3 0%, #fdf6e9 50%, #faf3e3 100%);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        #result-page.active {
            opacity: 1;
            pointer-events: auto;
        }

        .result-content {
            text-align: center;
            width: 90%;
            max-width: 450px;
            padding: 20px 0 60px;
        }

        .result-badge {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(230, 126, 34, 0.15);
            border-radius: 20px;
            font-size: 14px;
            color: #c05700;
            margin-bottom: 20px;
        }

        .result-type {
            font-size: 60px;
            margin-bottom: 10px;
            animation: popIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-title {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 25px;
            color: #3a3a3a;
            animation: slideUp 0.5s ease 0.2s both;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .result-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 25px;
            border: 1px solid rgba(200, 180, 150, 0.3);
            text-align: left;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            animation: slideUp 0.5s ease 0.4s both;
        }

        .result-hexagram {
            text-align: center;
            margin-bottom: 15px;
            animation: popIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .result-hexagram .hexagram-symbol {
            font-size: 72px;
            line-height: 1;
            margin-bottom: 5px;
        }

        .result-hexagram .hexagram-name {
            font-size: 28px;
            font-weight: 900;
            color: #3a3a3a;
            margin-bottom: 3px;
        }

        .result-hexagram .hexagram-motto {
            font-size: 16px;
            color: rgba(100,100,100,0.6);
            letter-spacing: 4px;
            margin-bottom: 8px;
        }

        .result-hexagram .hexagram-desc {
            font-size: 14px;
            color: #5a5a5a;
            line-height: 1.6;
            max-width: 320px;
            margin: 0 auto;
        }

        .result-section-label {
            font-size: 12px;
            color: rgba(200, 160, 100, 0.8);
            letter-spacing: 2px;
            margin-bottom: 12px;
            font-weight: 600;
        }

        .result-profile-emoji {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .result-desc {
            font-size: 16px;
            line-height: 1.8;
            color: #5a5a5a;
        }

        .result-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        .result-tag {
            padding: 8px 16px;
            background: rgba(230, 126, 34, 0.1);
            border-radius: 20px;
            font-size: 14px;
            color: #c05700;
            animation: tagIn 0.4s ease both;
        }

        @keyframes tagIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            animation: slideUp 0.5s ease 0.6s both;
        }

        .share-btn {
            padding: 16px;
            font-size: 17px;
            font-weight: bold;
            border: none;
            border-radius: 16px;
            background: #25D366;
            color: #fff;
            cursor: pointer;
        }

        .retry-btn {
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border: 2px solid rgba(200, 180, 150, 0.5);
            border-radius: 16px;
            background: transparent;
            color: #5a5a5a;
            cursor: pointer;
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            .title {
                font-size: 34px;
            }

            .question-text {
                font-size: 20px;
            }

            .result-type {
                font-size: 50px;
            }

            .result-title {
                font-size: 24px;
            }

            .emoji-icon {
                font-size: 60px;
            }

            .slide-page {
                padding: 50px 15px 90px;
            }

            .wheel-viewport {
                width: 180px;
                height: 200px;
            }

            .wheel-item {
                font-size: 18px;
                height: 40px;
            }

            .wheel-item.selected {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>

    <div class="app">
        <!-- 首页 -->
        <div id="home-page">
            <div class="home-content">
                <div class="emoji-icon">🔮</div>
                <h1 class="title">算命仙人</h1>
                <p class="subtitle">你是哪种摆烂仙人？</p>
                <button class="start-btn" onclick="startTest()">开始测试</button>
            </div>
        </div>

        <!-- 答题页 -->
        <div id="question-page">
            <div class="slide-container" id="slide-container">
                <!-- 动态生成题目 -->
            </div>
            <!-- 底部提示 -->
            <div class="next-hint" id="next-hint">
                <div class="next-hint-text">滑动翻页</div>
                <div class="next-arrow"><span>→</span></div>
            </div>
        </div>

        <!-- 结果页 -->
        <div id="result-page">
            <div class="result-content">
                <div class="result-badge">✨ 仙人掐指一算 ✨</div>
                <!-- 八卦区 -->
                <div class="result-hexagram" id="result-hexagram"></div>
                <h2 class="result-title" id="result-title"></h2>
                <!-- 个人画像卡片 -->
                <div class="result-card">
                    <div class="result-section-label">【个人画像】</div>
                    <div class="result-profile-emoji" id="result-profile-emoji"></div>
                    <p class="result-desc" id="result-desc"></p>
                    <div class="result-tags" id="result-tags"></div>
                </div>
                <!-- 未来建议卡片 -->
                <div class="result-card">
                    <div class="result-section-label">【未来建议】</div>
                    <p class="result-desc" id="result-prediction-desc"></p>
                    <div class="result-tags" id="result-prediction-tags"></div>
                </div>
                <div class="btn-group">
                    <button class="share-btn" onclick="shareResult()">📱 发给朋友比惨</button>
                    <button class="retry-btn" onclick="retry()">再摆一次烂</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== 粒子效果 ==========
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(230, 126, 34, ${this.opacity})`;
                ctx.fill();
            }
        }

        for (let i = 0; i < 25; i++) particles.push(new Particle());

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ========== 数据 ==========
        // 题目内容（根据v6文档，严格一字不差）
        const questions = [
            { 
                text: "你的出生年份是？", 
                options: [], // 转盘特殊处理
                isWheel: true,
                years: [2010, 2009, 2008, 2007, 2006, 2005, 2004, 2003, 2002, 2001, 2000, 1999, 1998, 1997, 1996]
            },
            { 
                text: "你的性别是？",
                options: ["A.男", "B.女"] 
            },
            { 
                text: "放长假（寒假/暑假）的第一天早上，你醒来第一件事是？",
                options: ["躺会儿，反正时间还长，待会儿再说", "差不多了，准备列个计划开始行动", "不行，必须现在就开始，不能浪费时间"] 
            },
            { 
                text: "周末晚上，你更想？",
                options: ["约朋友出去浪，宅在家里太浪费了", "在家待着，但有人约的话也可以出去", "一个人待着，不想被打扰"] 
            },
            { 
                text: "微信群里突然99+，你会？",
                options: ["爬楼看完，不看完难受", "看一眼有没有@我", "划走，等安静了再说"] 
            },
            { 
                text: "你最近的精神状态更像？",
                options: ["冉冉红日升——前途光明，元气满满", "间歇性踌躇满志，持续性混吃等死", "吃饭咬到舌头，小拇趾撞到床脚——水逆警告"] 
            },
            { 
                text: "深夜躺在床上，你在想？",
                options: ["明天去哪浪/吃点好的", "脑子里乱七八糟，停不下来", "烦，想哭。。。"] 
            },
            { 
                text: "朋友突然说\"完蛋了完蛋了\"，你觉得他？",
                options: ["摊上大事了，赶紧问问咋了", "常规操作，无非就是社死/挂科/被绿", "不玩"] 
            },
            { 
                text: "听到\"天王盖地虎\"，你会接？",
                options: ["宝塔镇河妖——经典咏流传", "小鸡炖蘑菇——入戏太深", "我论文还没写——这才是真正的劫"] 
            },
            { 
                text: "你的大脑CPU，90%算力用在了：",
                options: ["工作/生活/谈恋爱——正常运转中", "外卖满减精算——红包不能浪费", "大脑正在加载中。。。——其实什么都没想"] 
            }
        ];

        // 个人画像模块文案
        const profileModules = {
            // A1: 学生焦虑
            A1B1C1: { emoji: "📚", title: "卷王型学霸仙人", desc: "你的青春在试卷和补课中度过，但你不是甘于现状的人。你相信只要方向对了，努力总会有回报。想法很多，更重要的是把它做出来。朋友多、人脉广，是那种能带动气氛的学霸。", tags: ["主动进取", "外向型", "学生焦虑"] },

        // ========== Q1 iOS风格滚筒选择器 ==========
        const wheelYears = [2010, 2009, 2008, 2007, 2006, 2005, 2004, 2003, 2002, 2001, 2000, 1999, 1998, 1997, 1996];
        const ITEM_HEIGHT = 44;        // 每项高度
        const VIEWPORT_HEIGHT = 220;   // 视窗高度
        const VISIBLE_ITEMS = 5;       // 可见项数
        const HALF_VISIBLE = Math.floor(VISIBLE_ITEMS / 2); // 2

        let wheelOffset = 0;           // 当前滚动偏移（px）
        let wheelVelocity = 0;
        let lastWheelY = 0;

            setTimeout(() => {

            scrollArea.addEventListener('mousedown', startWheelDrag);

            document.addEventListener('mouseup', endWheelDrag);
            document.addEventListener('touchend', endWheelDrag);

            // 桌面端鼠标滚轮支持
            const viewport = document.getElementById('wheel-viewport');
            if (viewport) {
                viewport.addEventListener('wheel', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const delta = e.deltaY > 0 ? 1 : -1;
                    const targetIndex = Math.max(0, Math.min(wheelYears.length - 1, currentWheelIndex + delta));
                    snapWheelToIndex(targetIndex, true);
                }, { passive: false });
            }
        }

        function renderWheelItems() {

        function updateWheelDisplay() {
            const scrollArea = document.getElementById('wheel-scroll-area');
            if (!scrollArea) return;

            // 计算当前哪个年份在中心
            const rawIndex = wheelOffset / ITEM_HEIGHT;
            let centerIndex = Math.round(-rawIndex);

                if (!item) return;

                const itemOffset = i * ITEM_HEIGHT + wheelOffset;
                const distFromCenter = Math.abs(itemOffset + ITEM_HEIGHT / 2 - VIEWPORT_HEIGHT / 2);
                const maxDist = ITEM_HEIGHT * HALF_VISIBLE;

                // scale: 中心=1.0，边缘=0.7
                const scale = Math.max(0.68, 1 - (distFromCenter / maxDist) * 0.32);
                // opacity: 中心=1，边缘=0.3
                const opacity = Math.max(0.25, 1 - (distFromCenter / maxDist) * 0.75);
                // color
                const isSelected = i === centerIndex;

                item.style.transform = `translateY(${itemOffset}px) scale(${scale})`;
                item.style.opacity = opacity;
                item.classList.toggle('selected', isSelected);
            });

            selectedYear = wheelYears[centerIndex];
            currentWheelIndex = centerIndex;

            // 启用确认按钮

        function snapWheelToIndex(targetIndex, animate = true) {
            const rawOffset = -targetIndex * ITEM_HEIGHT;

            if (!animate) {
                wheelOffset = rawOffset;
                updateWheelDisplay();
                return;
            }

            wheelAnimating = true;
            const startOffset = wheelOffset;
            const startTime = performance.now();
            const duration = 200;

            function animateSnap(now) {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                // ease-out cubic
                const ease = 1 - Math.pow(1 - progress, 3);

                wheelOffset = startOffset + (rawOffset - startOffset) * ease;
                updateWheelDisplay();

                if (progress < 1) {
                    requestAnimationFrame(animateSnap);
                } else {
                    wheelOffset = rawOffset;
                    wheelAnimating = false;
                    updateWheelDisplay();
                }
            }
            requestAnimationFrame(animateSnap);
        }

                if (selectedOption >= 0 || current === 0) { // Q1用selectedYear
                    nextHint.innerHTML = `
                        <div class="next-hint-text">滑动翻页</div>
                        <div class="next-arrow"><span>→</span></div>
                    `;
                    nextHint.classList.add('show');
                } else {
                    nextHint.classList.remove('show');
                }
            }
        }

        function updateUI() {
            // 更新滑动位置
            slideContainer.style.transform = `translateX(${-current * 100}%)`;
            
            // Q1特殊处理
            if (current === 0) {
                selectedOption = -1; // Q1不用selectedOption
                nextHint.classList.remove('show');
            } else {
                // 重置选中状态
                selectedOption = answers[current] !== undefined ? answers[current] : -1;

                // 更新选项选中状态
                const currentSlide = slideContainer.children[current];
                if (currentSlide) {
                    currentSlide.querySelectorAll('.option').forEach(opt => {
                        if (parseInt(opt.dataset.option) === selectedOption) {
                            opt.classList.add('selected');
                        } else {
                            opt.classList.remove('selected');
                        }
                    });
                }
                updateHint();
            }
        }

        // ========== 滑动翻页 ==========
        function goToNext() {
            if (isAnimating) return;
            if (current >= questions.length - 1) return;
            
            // Q1需要已确认的年份
            if (current === 0 && !yearConfirmed) return;
            
            // 非Q1需要selectedOption
            if (current > 0 && selectedOption < 0) return;
            
            isAnimating = true;

            answers[current] = current === 0 ? selectedYear : selectedOption;
            current++;
            selectedOption = -1;

            slideContainer.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            slideContainer.style.transform = `translateX(${-current * 100}%)`;

            setTimeout(() => {
                isAnimating = false;
                selectedOption = answers[current] !== undefined ? answers[current] : -1;
                
                // 如果是最后一题
                if (current === questions.length - 1) {
                    selectedOption = answers[current] !== undefined ? answers[current] : -1;
                }
                
                updateHint();
            }, 400);
        }

        function goToPrev() {
            if (isAnimating || current <= 0) return;
            isAnimating = true;

            current--;
            selectedOption = answers[current] !== undefined ? answers[current] : -1;
            if (current === 0) {
                selectedYear = answers[0];
                yearConfirmed = false;
                // 恢复滚筒位置
                const savedIndex = wheelYears.indexOf(selectedYear);
                currentWheelIndex = savedIndex >= 0 ? savedIndex : 8;
                setTimeout(() => {
                    wheelOffset = -currentWheelIndex * ITEM_HEIGHT;
                    updateWheelDisplay();
                }, 50);
            }

            slideContainer.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            slideContainer.style.transform = `translateX(${-current * 100}%)`;

            setTimeout(() => {
                isAnimating = false;
                updateHint();
            }, 400);
        }

        function goToResult() {
            if (isAnimating) return;
            if (selectedOption < 0) return;
            
            isAnimating = true;
            answers[current] = selectedOption;

            // 隐藏答题页，显示结果页
            questionPage.classList.remove('active');

            setTimeout(() => {
                const resultPage = document.getElementById('result-page');
                resultPage.classList.add('active');

                // 计算结果
                const result = calculateResult();
                
                // 渲染八卦
                const hexHtml = `
                    <div class="hexagram-symbol">${result.hexagram.symbol}</div>
                    <div class="hexagram-name">${result.hexagram.name}</div>
                    <div class="hexagram-motto">—— ${result.hexagram.motto}</div>
                    <div class="hexagram-desc">${result.hexagram.desc}</div>
                `;
                document.getElementById('result-hexagram').innerHTML = hexHtml;
                
                document.getElementById('result-title').textContent = result.profile.title;
                document.getElementById('result-profile-emoji').textContent = result.profile.emoji;
                document.getElementById('result-desc').textContent = result.profile.desc;

                // 个人画像标签
                const tagsContainer = document.getElementById('result-tags');
                tagsContainer.innerHTML = '';
                result.profile.tags.forEach((t, i) => {
                    const tag = document.createElement('span');
                    tag.className = 'result-tag';
                    tag.textContent = '# ' + t;
                    tag.style.animationDelay = `${0.5 + i * 0.1}s`;
                    tagsContainer.appendChild(tag);
                });

                // 未来建议
                document.getElementById('result-prediction-desc').textContent = result.prediction.desc;
                const predTagsContainer = document.getElementById('result-prediction-tags');
                predTagsContainer.innerHTML = '';
                result.prediction.tags.forEach((t, i) => {
                    const tag = document.createElement('span');
                    tag.className = 'result-tag';
                    tag.textContent = '# ' + t;
                    tag.style.animationDelay = `${0.6 + i * 0.1}s`;
                    predTagsContainer.appendChild(tag);
                });

                isAnimating = false;
            }, 300);
        }

        // ========== 分类逻辑 ==========
        function calculateResult() {
            // answers数组: [0]=年份, [1]=性别, [2]=Q3, [3]=Q4, [4]=Q5, [5]=Q6, [6]=Q7, [7]=Q8, [8]=Q9, [9]=Q10
            
            const birthYear = answers[0]; // 年份
            const q3 = answers[2]; // 适应策略
            const q4 = answers[3]; // 社交1
            const q5 = answers[4]; // 社交2
            const q6 = answers[5]; // 精神状态1
            const q7 = answers[6]; // 精神状态2
            const q8 = answers[7]; // 抽象1
            const q9 = answers[8]; // 抽象2
            const q10 = answers[9]; // 抽象3

            // 计算年龄
            const currentYear = 2026;
            const age = currentYear - birthYear;

            // A维度：焦虑阶段（16~21岁A1，22~24岁A2，25~30岁A3）
            let aType = 'A1';
            if (age >= 22 && age <= 24) aType = 'A2';
            else if (age >= 25 && age <= 30) aType = 'A3';

            // B维度：适应策略（Q3直接决定：A→B1，B→B2，C→B3）
            let bType = 'B1';
            if (q3 === 1) bType = 'B2';
            else if (q3 === 2) bType = 'B3';

            // C维度：社交倾向（Q4+Q5评分：A=3，B=2，C=1，≥4分→C1外向，<4分→C2内向）
            const cScore = getScore(q4) + getScore(q5);
            const cType = cScore >= 4 ? 'C1' : 'C2';

            // D维度：未来预测（Q7去掉C后，选项变为[A,B,D]，D即为原D）
            // Q6+Q7 score范围：2-6
            const dScore = getScore(q6) + getScore(q7);
            const cCount = [q8, q9, q10].filter(q => q === 2).length;

            let dType = 'D1'; // 默认积极型
            if (dScore <= 3) {
                dType = 'D2'; // 2-3分 → 先苦后甜
            } else if (dScore === 4) {
                // 4分 → 按Q8-Q10 C数量
                if (cCount === 0) dType = 'D4';
                else if (cCount === 1) dType = 'D5';
                else if (cCount >= 2) dType = 'D3';
            } else {
                // 5-6分 → 按Q8-Q10 C数量
                if (cCount === 0) dType = 'D1';
                else if (cCount === 1) dType = 'D4';
                else if (cCount === 2) dType = 'D5';
                else if (cCount === 3) dType = 'D3';
            }

            // 八卦计算（河洛数 → 先天八卦）
            // 男性：100 - 年份后两位，再对9取余（余0→坤卦，余5→特殊处理）
            // 女性：年份后两位 + 6，再对9取余（余0→乾卦，余5→特殊处理）
            const yearLast2 = birthYear % 100;
            let remainder;
            if (answers[1] === 0) { // 男
                remainder = ((100 - yearLast2) % 9 + 9) % 9; // 范围0-8
            } else { // 女
                remainder = ((yearLast2 + 6) % 9 + 9) % 9; // 范围0-8
            }
            // 余数为5的特殊情况：男→坤卦(0)，女→艮卦(8)
            const hexKey = (remainder === 5)
                ? (answers[1] === 0 ? 0 : 8)
                : remainder;
            const hexagram = hexagrams[hexKey];

            // 组合画像
            const profileKey = `${aType}${bType}${cType}`;
            const profile = profileModules[profileKey] || profileModules['A1B1C1'];
            const prediction = predictions[dType];

            return {
                hexagram: hexagram,
                profile: profile,
                prediction: prediction
            };
        }

        // 选项分数：A=3, B=2, C=1（Q7去C后原D改为C，分值1）
        function getScore(optionIndex) {
            if (optionIndex === 0) return 3; // A选项
            if (optionIndex === 1) return 2; // B选项
            if (optionIndex === 2) return 1; // C选项（原D）
            return 1; // 默认
        }

        // ========== 触摸事件 ==========
        questionPage.addEventListener('touchstart', (e) => {
            if (isAnimating) return;

            const target = e.target;
            isTouchOnOption = target.closest('.option') !== null || target.closest('.wheel-scroll-area') !== null;

            // Q1 未确认年份 → 禁止页面滑动（只能操作滚筒）
            if (current === 0 && !yearConfirmed) {
                isDragging = false;
                return;
            }
            
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            touchCurrentX = touchStartX;
            dragStartTime = Date.now();
            hasMoved = false;
            isDragging = true;

            slideContainer.style.transition = 'none';
        }, { passive: true });

        questionPage.addEventListener('touchmove', (e) => {
            if (!isDragging || isAnimating || isTouchOnOption) return;

            const currentX = e.touches[0].clientX;
            const currentY = e.touches[0].clientY;
            const deltaX = currentX - touchStartX;
            const deltaY = currentY - touchStartY;

            if (!hasMoved) {
                if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > 10) {
                    isDragging = false;
                    return;
                }
                hasMoved = true;
            }

            touchCurrentX = currentX;

            let offset = -current * window.innerWidth + deltaX;
            const maxLeft = -(questions.length - 1) * window.innerWidth;

            if (offset < maxLeft) {
                offset = maxLeft + (offset - maxLeft) * 0.3;
            }
            if (offset > 0) {
                offset = offset * 0.3;
            }

            slideContainer.style.transform = `translateX(${offset}px)`;
        }, { passive: true });

        questionPage.addEventListener('touchend', () => {
            if (!isDragging) return;
            isDragging = false;
            
            if (isTouchOnOption) {
                isTouchOnOption = false;
                return;
            }
            isTouchOnOption = false;

            const deltaX = touchCurrentX - touchStartX;
            const deltaTime = Date.now() - dragStartTime;
            const velocity = deltaTime > 0 ? Math.abs(deltaX) / deltaTime : 0;
            const threshold = window.innerWidth / 3;

            if (Math.abs(deltaX) < 15) {
                return;
            }

            if (current === questions.length - 1) {
                if (deltaX > threshold || (deltaX > 30 && velocity > 0.3)) {
                    goToPrev();
                } else {
                    snapBack();
                }
                return;
            }

            if (deltaX < -threshold || (deltaX < -50 && velocity > 0.4)) {
                if (current === 0 ? selectedYear : selectedOption >= 0) {
                    goToNext();
                } else {
                    snapBack();
                }
            } else if (deltaX > threshold || (deltaX > 50 && velocity > 0.4)) {
                goToPrev();
            } else {
                snapBack();
            }
        });

        function snapBack() {
            isAnimating = true;
            slideContainer.style.transition = 'transform 0.3s ease';
            slideContainer.style.transform = `translateX(${-current * 100}%)`;

            setTimeout(() => {
                isAnimating = false;
            }, 300);
        }

        // ========== 键盘支持 ==========
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                if (current === 0 ? selectedYear : selectedOption >= 0 && current < questions.length - 1) {
                    goToNext();
                } else if (current === questions.length - 1 && selectedOption >= 0) {
                    goToResult();
                }
            } else if (e.key === 'ArrowLeft') {
                goToPrev();
            } else if (e.key === 'Enter' && (current === 0 ? selectedYear : selectedOption >= 0)) {
                if (current < questions.length - 1) {
                    goToNext();
                } else {
                    goToResult();
                }
            }
        });

        // ========== 分享 & 重试 ==========
        function shareResult() {
            const title = document.getElementById('result-title').textContent;
            const text = `🔮 刚测了「算命仙人」，我是${title}！\n\n你也来试试？👇\nhttps://israel-rain.github.io/suanming/`;

            if (navigator.share) {
                navigator.share({ title: '算命仙人', text });
            } else {
                navigator.clipboard.writeText(text).then(() => {
                    alert('已复制到剪贴板！快去朋友圈发吧~');
                });
            }
        }

        function retry() {
            const resultPage = document.getElementById('result-page');
            resultPage.classList.remove('active');
            questionPage.classList.remove('active');

            setTimeout(() => {
                document.getElementById('home-page').classList.remove('hidden');
            }, 300);
        }

        // ========== 窗口大小变化 ==========
        window.addEventListener('resize', () => {
            resizeCanvas();
            if (questionPage.classList.contains('active')) {
                slideContainer.style.transition = 'none';
                slideContainer.style.transform = `translateX(${-current * 100}%)`;
            }
        });
    </script>
</body>
