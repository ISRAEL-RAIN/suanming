<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>算命仙人 - 你是哪种摆烂仙人</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fef9f3 0%, #fdf6e9 50%, #faf3e3 100%);
            color: #4a4a4a;
        }

        /* 粒子画布 */
        #particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        /* 页面容器 */
        .app {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* ========== 首页 ========== */
        #home-page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 10;
        }

        #home-page.hidden {
            display: none;
        }

        .home-content {
            text-align: center;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .emoji-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .title {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 10px;
            color: #3a3a3a;
        }

        .subtitle {
            font-size: 16px;
            color: rgba(100, 100, 100, 0.8);
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        .start-btn {
            padding: 16px 50px;
            font-size: 18px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: #fff;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(230, 126, 34, 0.3);
        }

        /* ========== 答题页 ========== */
        #question-page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            z-index: 5;
            overflow: hidden;
        }

        #question-page.active {
            display: block;
        }

        /* 滑动容器 */
        .slide-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* 单个题目页 */
        .slide-page {
            min-width: 100%;
            height: 100%;
            padding: 60px 20px 100px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fef9f3 0%, #fdf6e9 50%, #faf3e3 100%);
        }

        .question-content {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(200, 180, 150, 0.3);
            border-radius: 2px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #e67e22, #f39c12);
            border-radius: 2px;
            transition: width 0.3s ease;
        }

        .question-number {
            font-size: 14px;
            color: rgba(100, 100, 100, 0.6);
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 22px;
            margin-bottom: 35px;
            line-height: 1.5;
            font-weight: 600;
            color: #3a3a3a;
            text-align: center;
        }

        /* 选项 */
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 450px;
        }

        .option {
            padding: 18px 24px;
            font-size: 16px;
            border: 2px solid rgba(200, 180, 150, 0.4);
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.9);
            color: #5a5a5a;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: left;
        }

        .option:active {
            transform: scale(0.98);
        }

        .option.selected {
            background: linear-gradient(135deg, rgba(230, 126, 34, 0.15), rgba(211, 84, 0, 0.1));
            border-color: #e67e22;
            color: #c05700;
            transform: scale(1.02);
        }

        /* ========== 转盘样式 (Q1) - 可拖动旋转 ========== */
        .wheel-picker-container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .wheel-label {
            font-size: 18px;
            color: #c05700;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .wheel-wrapper {
            position: relative;
            width: 300px;
            height: 175px;
            cursor: grab;
            touch-action: none;
            user-select: none;
        }

        .wheel-wrapper:active {
            cursor: grabbing;
        }

        .wheel-svg {
            width: 300px;
            height: 175px;
            overflow: visible;
        }

        .wheel-segment-path {
            fill: rgba(255, 255, 255, 0.95);
            stroke: rgba(200, 180, 150, 0.5);
            stroke-width: 1.5;
            transition: fill 0.2s ease;
        }

        .wheel-segment-path.selected {
            fill: #e67e22;
            stroke: #d35400;
        }

        .wheel-segment-text {
            font-size: 13px;
            font-weight: 600;
            fill: #5a5a5a;
            pointer-events: none;
            dominant-baseline: middle;
            text-anchor: middle;
            transition: fill 0.2s ease;
        }

        .wheel-segment-text.selected {
            fill: #fff;
        }

        .wheel-pointer {
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-bottom: 22px solid #e67e22;
            z-index: 10;
            filter: drop-shadow(0 2px 4px rgba(230, 126, 34, 0.4));
        }

        .wheel-center-text {
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 26px;
            font-weight: bold;
            color: #e67e22;
            z-index: 5;
            text-shadow: 0 1px 3px rgba(0,0,0,0.15);
            min-width: 60px;
            text-align: center;
        }

        .confirm-btn {
            margin-top: 15px;
            padding: 12px 36px;
            font-size: 15px;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: #fff;
            cursor: pointer;
            opacity: 0.4;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .confirm-btn.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* 底部提示 */
        .next-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            text-align: center;
        }

        .next-hint.show {
            opacity: 1;
            pointer-events: auto;
        }

        .next-hint-text {
            font-size: 13px;
            color: rgba(100, 100, 100, 0.6);
            margin-bottom: 8px;
        }

        .next-arrow {
            animation: arrowBounce 1s ease-in-out infinite;
        }

        .next-arrow span {
            font-size: 24px;
            color: #e67e22;
        }

        @keyframes arrowBounce {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(8px); }
        }

        .view-result-btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: 2px solid #e67e22;
            border-radius: 25px;
            background: linear-gradient(135deg, #e67e22, #d35400);
            color: #fff;
            cursor: pointer;
        }

        /* ========== 结果页 (支持上下滚动) ========== */
        #result-page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            z-index: 20;
            background: linear-gradient(135deg, #fef9f3 0%, #fdf6e9 50%, #faf3e3 100%);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        #result-page.active {
            opacity: 1;
            pointer-events: auto;
        }

        .result-content {
            text-align: center;
            width: 90%;
            max-width: 450px;
            padding: 20px 0 60px;
        }

        .result-badge {
            display: inline-block;
            padding: 8px 20px;
            background: rgba(230, 126, 34, 0.15);
            border-radius: 20px;
            font-size: 14px;
            color: #c05700;
            margin-bottom: 20px;
        }

        .result-type {
            font-size: 60px;
            margin-bottom: 10px;
            animation: popIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .result-title {
            font-size: 28px;
            font-weight: 900;
            margin-bottom: 25px;
            color: #3a3a3a;
            animation: slideUp 0.5s ease 0.2s both;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .result-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 25px;
            border: 1px solid rgba(200, 180, 150, 0.3);
            text-align: left;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            animation: slideUp 0.5s ease 0.4s both;
        }

        .result-desc {
            font-size: 16px;
            line-height: 1.8;
            color: #5a5a5a;
        }

        .result-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        .result-tag {
            padding: 8px 16px;
            background: rgba(230, 126, 34, 0.1);
            border-radius: 20px;
            font-size: 14px;
            color: #c05700;
            animation: tagIn 0.4s ease both;
        }

        @keyframes tagIn {
            from { transform: scale(0); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            animation: slideUp 0.5s ease 0.6s both;
        }

        .share-btn {
            padding: 16px;
            font-size: 17px;
            font-weight: bold;
            border: none;
            border-radius: 16px;
            background: #25D366;
            color: #fff;
            cursor: pointer;
        }

        .retry-btn {
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border: 2px solid rgba(200, 180, 150, 0.5);
            border-radius: 16px;
            background: transparent;
            color: #5a5a5a;
            cursor: pointer;
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            .title {
                font-size: 34px;
            }

            .question-text {
                font-size: 20px;
            }

            .result-type {
                font-size: 50px;
            }

            .result-title {
                font-size: 24px;
            }

            .emoji-icon {
                font-size: 60px;
            }

            .slide-page {
                padding: 50px 15px 90px;
            }

            .wheel-wrapper {
                width: 280px;
                height: 170px;
            }

            .wheel-segment {
                width: 70px;
                height: 55px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <canvas id="particles"></canvas>

    <div class="app">
        <!-- 首页 -->
        <div id="home-page">
            <div class="home-content">
                <div class="emoji-icon">🔮</div>
                <h1 class="title">算命仙人</h1>
                <p class="subtitle">你是哪种摆烂仙人？</p>
                <button class="start-btn" onclick="startTest()">开始测试</button>
            </div>
        </div>

        <!-- 答题页 -->
        <div id="question-page">
            <div class="slide-container" id="slide-container">
                <!-- 动态生成题目 -->
            </div>
            <!-- 底部提示 -->
            <div class="next-hint" id="next-hint">
                <div class="next-hint-text">已选，滑动翻页</div>
                <div class="next-arrow"><span>→</span></div>
            </div>
        </div>

        <!-- 结果页 -->
        <div id="result-page">
            <div class="result-content">
                <div class="result-badge">✨ 仙人掐指一算 ✨</div>
                <div class="result-type" id="result-type"></div>
                <h2 class="result-title" id="result-title"></h2>
                <div class="result-card">
                    <p class="result-desc" id="result-desc"></p>
                    <div class="result-tags" id="result-tags"></div>
                </div>
                <div class="btn-group">
                    <button class="share-btn" onclick="shareResult()">📱 发给朋友比惨</button>
                    <button class="retry-btn" onclick="retry()">再摆一次烂</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== 粒子效果 ==========
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(230, 126, 34, ${this.opacity})`;
                ctx.fill();
            }
        }

        for (let i = 0; i < 25; i++) particles.push(new Particle());

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ========== 数据 ==========
        // 题目内容（根据v6文档）
        const questions = [
            { 
                text: "你的生辰八字是？", 
                options: [], // 转盘特殊处理
                isWheel: true,
                years: [2010, 2009, 2008, 2007, 2006, 2005, 2004, 2003, 2002, 2001, 2000, 1999, 1998, 1997, 1996]
            },
            { 
                text: "你的性别是？", 
                options: ["A.男", "B.女"] 
            },
            { 
                text: "假期作业你会？", 
                options: ["早早写完，爽爽玩", "拖到最后几天写", "老师，我没带。。。"] 
            },
            { 
                text: "周末晚上，你更想？", 
                options: ["约朋友出去浪", "有人约的话也可以出去", "一个人待着"] 
            },
            { 
                text: "微信群里突然99+，你会？", 
                options: ["爬楼看完", "看一眼有没有@我", "划走"] 
            },
            { 
                text: "你最近的精神状态更像？", 
                options: ["冉冉红日升", "间歇性踌躇满志", "吃饭咬到舌头，水逆警告"] 
            },
            { 
                text: "深夜躺在床上，你在想？", 
                options: ["明天去哪浪", "脑子里乱七八糟", "后悔/担心", "烦，想哭。。。"] 
            },
            { 
                text: '"完蛋了完蛋了"什么意思？', 
                options: ["摊上大事了", "常规社死/挂科/被绿", "不玩"] 
            },
            { 
                text: '"天王盖地虎"你会接？', 
                options: ["宝塔镇河妖", "小鸡炖蘑菇", "论文还没写"] 
            },
            { 
                text: "大脑CPU 90%算力用在？", 
                options: ["工作/恋爱", "外卖满减精算", "正在计算中"] 
            }
        ];

        // 个人画像模块文案
        const profileModules = {
            // A1: 学生焦虑
            A1B1C1: { emoji: "📚", title: "卷王型学霸仙人", desc: "你的青春在试卷和补课中度过，但你不是甘于现状的人。你相信只要方向对了，努力总会有回报。想法很多，更重要的是把它做出来。朋友多、人脉广，是那种能带动气氛的学霸。", tags: ["主动进取", "外向型", "学生焦虑"] },
            A1B1C2: { emoji: "🎯", title: "内敛型卷王仙人", desc: "你的青春在试卷和补课中度过，但你更愿意把时间留给自己。你相信积累的力量，今天的每一点努力，都是在为明天铺路。朋友不多，但每一个都是你真正认可的人。", tags: ["主动进取", "内向型", "学生焦虑"] },
            A1B2C1: { emoji: "🌊", title: "社交型适应仙人", desc: "你以为毕业告别的是校园，后来才发现告别的是'还有时间慢慢来'的从容。但你有一种难得的沉稳，看准方向、借势而为，在合适的时候做出合适的选择。朋友多、人脉广。", tags: ["被动适应", "外向型", "学生焦虑"] },
            A1B2C2: { emoji: "🧘", title: "沉稳型适应仙人", desc: "你以为毕业告别的是校园，但你更像是在风浪里找平衡的人——看准方向，借势而为。船到桥头自然直，这是你的人生哲学。一个人吃饭、一个人看电影，这些对你来说是舒服的状态。", tags: ["被动适应", "内向型", "学生焦虑"] },
            A1B3C1: { emoji: "📋", title: "乖乖型学生仙人", desc: "你的青春在试卷和补课中度过，你相信大多数人的选择不会错——稳定、安全、不冒险。学习按部就班、步步为营。你擅长和人打交道，无论走到哪都能很快融入环境。", tags: ["中规中矩", "外向型", "学生焦虑"] },
            A1B3C2: { emoji: "📖", title: "安静型乖学生仙人", desc: "你的青春在试卷和补课中度过，你不是那种有强烈胜负欲的人，但也绝不是躺平一族。在一条被标注好的路上，走得稳稳当当，不快也不掉队。", tags: ["中规中矩", "内向型", "学生焦虑"] },
            // A2: 入世焦虑
            A2B1C1: { emoji: "🚀", title: "冲劲型入世仙人", desc: "你以为毕业告别的是校园，后来才发现告别的是'还有时间慢慢来'的从容。但你不是那种冲在最前面的人，却更愿意花时间、花精力去打磨自己想做的事。朋友多、人脉广，是团队的润滑剂。", tags: ["主动进取", "外向型", "入世焦虑"] },
            A2B1C2: { emoji: "💎", title: "专注型入世仙人", desc: "考研卷、考公难、找工作的人早已泛滥，你为上岸焦头烂额。但你相信积累的力量，今天的每一点努力，都是在为明天铺路。你愿意花时间打磨自己想做的事，朋友不多但都是精英。", tags: ["主动进取", "内向型", "入世焦虑"] },

        const predictions = {

        // ========== 状态 ==========
        let current = 0;

        let currentX = 0;
        let touchStartX = 0;
        let touchStartY = 0;
        let touchCurrentX = 0;
        let dragStartTime = 0;
        let hasMoved = false;
        let isTouchOnOption = false;

        const slideContainer = document.getElementById('slide-container');
        const questionPage = document.getElementById('question-page');
        const nextHint = document.getElementById('next-hint');

        // ========== 初始化 ==========
        function startTest() {
            current = 0;
            selectedOption = -1;
            answers = [];
            selectedYear = null;
            wheelRotation = 0;

            document.getElementById('home-page').classList.add('hidden');
            generateSlides();
            questionPage.classList.add('active');
            updateUI();
        }

        function generateSlides() {
            slideContainer.innerHTML = '';
            slideContainer.style.transform = 'translateX(0)';

            questions.forEach((q, index) => {
                const slide = document.createElement('div');
                slide.className = 'slide-page';
                slide.dataset.index = index;

                let content = '';

                // Q1 转盘特殊处理
                if (q.isWheel) {
                    const years = q.years;
                    content = generateWheelHTML(index, years);
                } else {
                    const shuffled = shuffleArray([...Array(q.options.length).keys()]);
                    content = `
                        <div class="question-content">
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${((index + 1) / questions.length) * 100}%"></div>

                                `).join('')}

                    `;

                slide.innerHTML = content;
                slideContainer.appendChild(slide);

            // 绑定选项点击

        function generateWheelHTML(index, years) {
            // SVG半圆形轮盘 - 指针在底部固定，拖动轮盘旋转
            const cx = 150, cy = 140, radius = 120;
            const numSegments = years.length; // 15个年份
            const arcAngle = 180 / (numSegments - 1); // 每个间隔12.86度

            // 计算每个年份的位置（相对于圆心）
            const segmentPositions = years.map((year, i) => {
                const angle = Math.PI - (i * arcAngle * Math.PI / 180); // 从左(π)到右(0)
                const x = cx + (radius - 15) * Math.cos(angle);
                const y = cy - (radius - 15) * Math.sin(angle);
                return { year, x, y, angle };
            });

            // 生成SVG片段和文字
            const paths = segmentPositions.map((seg, i) => {
                const angle1 = Math.PI - (i * arcAngle * Math.PI / 180);
                const angle2 = Math.PI - ((i + 1) * arcAngle * Math.PI / 180);
                const x1 = cx + (radius - 5) * Math.cos(angle1);
                const y1 = cy - (radius - 5) * Math.sin(angle1);
                const x2 = cx + (radius - 5) * Math.cos(angle2);
                const y2 = cy - (radius - 5) * Math.sin(angle2);
                const x3 = cx + radius * Math.cos(angle2);
                const y3 = cy - radius * Math.sin(angle2);
                const x4 = cx + radius * Math.cos(angle1);
                const y4 = cy - radius * Math.sin(angle1);

                const path = `M ${cx} ${cy} L ${x1} ${y1} A ${radius - 5} ${radius - 5} 0 0 1 ${x2} ${y2} Z`;
                return `<path class="wheel-segment-path" id="seg-${i}" d="${path}" data-index="${i}"/>`;
            }).join('');

            const texts = segmentPositions.map((seg, i) => {
                return `<text class="wheel-segment-text" id="txt-${i}" x="${seg.x.toFixed(1)}" y="${seg.y.toFixed(1)}">${seg.year}</text>`;
            }).join('');

            // 指针三角形（底部固定）
            const pointerPath = `M ${cx} ${cy + 5} L ${cx - 12} ${cy + 32} L ${cx + 12} ${cy + 32} Z`;

            return `
                <div class="question-content">
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${((index + 1) / questions.length) * 100}%"></div>
                    </div>
                    <div class="question-number">第 ${index + 1} 题</div>
                    <div class="wheel-picker-container">
                        <div class="wheel-label">🎯 生辰八字</div>
                        <div class="wheel-wrapper" id="wheel-wrapper">
                            <svg class="wheel-svg" id="wheel-svg" viewBox="0 0 300 175">
                                <!-- 半圆弧背景 -->
                                <path d="M ${cx - radius} ${cy} A ${radius} ${radius} 0 0 1 ${cx + radius} ${cy}" 
                                      fill="none" stroke="rgba(200,180,150,0.2)" stroke-width="2"/>
                                <!-- 可旋转的年份组 -->
                                <g id="wheel-rotatable">
                                    ${paths}
                                    ${texts}
                                </g>
                                <!-- 圆心 -->
                                <circle cx="${cx}" cy="${cy}" r="6" fill="rgba(200,180,150,0.3)"/>
                                <!-- 固定指针 -->
                                <path d="${pointerPath}" fill="#e67e22" filter="url(#pointer-shadow)"/>
                                <defs>
                                    <filter id="pointer-shadow" x="-20%" y="-20%" width="140%" height="140%">
                                        <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="rgba(230,126,34,0.4)"/>
                                    </filter>
                                </defs>
                            </svg>
                            <div class="wheel-pointer"></div>
                            <div class="wheel-center-text" id="selected-year-display">?</div>
                        </div>
                        <button class="confirm-btn" id="year-confirm-btn">确认年份</button>
                    </div>
                </div>
            `;
        }

        // ========== Q1轮盘拖动逻辑 ==========
        let wheelRotation = 0;
        let isWheelDragging = false;
        let wheelDragStartX = 0;
        let wheelDragStartRotation = 0;
        let wheelVelocity = 0;
        let lastWheelX = 0;
        let lastWheelTime = 0;
        const wheelYears = [2010, 2009, 2008, 2007, 2006, 2005, 2004, 2003, 2002, 2001, 2000, 1999, 1998, 1997, 1996];
        const wheelArcDeg = 180 / (wheelYears.length - 1); // 12.857度/格

        function setupWheelDrag() {
            const wrapper = document.getElementById('wheel-wrapper');
            if (!wrapper) return;

            wrapper.addEventListener('mousedown', startWheelDrag);
            wrapper.addEventListener('touchstart', startWheelDrag, { passive: false });

            document.addEventListener('mousemove', moveWheelDrag);
            document.addEventListener('touchmove', moveWheelDrag, { passive: false });

            document.addEventListener('mouseup', endWheelDrag);
            document.addEventListener('touchend', endWheelDrag);
        }

        function startWheelDrag(e) {
            e.preventDefault();
            isWheelDragging = true;
            const point = e.touches ? e.touches[0] : e;
            wheelDragStartX = point.clientX;
            wheelDragStartRotation = wheelRotation;
            lastWheelX = point.clientX;
            lastWheelTime = Date.now();
            wheelVelocity = 0;
        }

        function moveWheelDrag(e) {
            if (!isWheelDragging) return;
            e.preventDefault();

            const point = e.touches ? e.touches[0] : e;
            const deltaX = point.clientX - wheelDragStartX;

            // 将横向移动映射到旋转角度
            // 拖动 1px ≈ 旋转 0.3度
            const sensitivity = 0.35;
            wheelRotation = wheelDragStartRotation + deltaX * sensitivity;

            // 更新视觉
            const rotatable = document.getElementById('wheel-rotatable');
            if (rotatable) {
                rotatable.style.transformOrigin = '150px 140px';
                rotatable.style.transform = `rotate(${wheelRotation}deg)`;
            }

            // 计算速度
            const now = Date.now();
            const dt = now - lastWheelTime;
            if (dt > 0) {
                wheelVelocity = (point.clientX - lastWheelX) / dt * 1000;
            }
            lastWheelX = point.clientX;
            lastWheelTime = now;

            // 更新选中状态
            updateWheelSelection();
        }

        function endWheelDrag(e) {
            if (!isWheelDragging) return;
            isWheelDragging = false;

            // 应用惯性
            if (Math.abs(wheelVelocity) > 50) {
                applyWheelInertia();
            } else {
                // 吸附到最近的格
                snapWheelToNearest();
            }
        }

        function applyWheelInertia() {
            const friction = 0.95;
            const minVelocity = 0.5;
            let velocity = wheelVelocity * 0.3; // 缩小惯性系数

            function animate() {
                if (Math.abs(velocity) < minVelocity) {
                    snapWheelToNearest();
                    return;
                }
                wheelRotation += velocity * 0.02;
                velocity *= friction;

                const rotatable = document.getElementById('wheel-rotatable');
                if (rotatable) {
                    rotatable.style.transformOrigin = '150px 140px';
                    rotatable.style.transform = `rotate(${wheelRotation}deg)`;
                }
                updateWheelSelection();
                requestAnimationFrame(animate);
            }
            requestAnimationFrame(animate);
        }

        function snapWheelToNearest() {
            // 计算当前指针（第0格）对应的年份索引
            // 指针在顶部(0度位置)，轮盘旋转后，哪个年份对准指针？
            // normalizedRotation 是让第0格对准指针需要的旋转
            const normalizedRotation = ((wheelRotation % 360) + 360) % 360;
            let closestIndex = Math.round(normalizedRotation / wheelArcDeg);

            // 吸附动画
            const targetRotation = closestIndex * wheelArcDeg;
            const startRotation = wheelRotation;
            const diff = targetRotation - (normalizedRotation % 360);
            let adjustedDiff = diff;
            if (diff > 180) adjustedDiff = diff - 360;
            if (diff < -180) adjustedDiff = diff + 360;
            const target = startRotation + adjustedDiff;

            let startTime = null;
            function animateSnap(time) {
                if (!startTime) startTime = time;
                const progress = Math.min((time - startTime) / 200, 1);
                const ease = 1 - Math.pow(1 - progress, 3); // easeOutCubic

                wheelRotation = startRotation + (target - startRotation) * ease;

                const rotatable = document.getElementById('wheel-rotatable');
                if (rotatable) {
                    rotatable.style.transformOrigin = '150px 140px';
                    rotatable.style.transform = `rotate(${wheelRotation}deg)`;
                }
                updateWheelSelection();

                if (progress < 1) requestAnimationFrame(animateSnap);
            }
            requestAnimationFrame(animateSnap);
        }

        function updateWheelSelection() {
            // 指针在顶部(0度视觉位置)，计算哪个年份对准指针
            // wheelRotation 是当前旋转，正值=顺时针
            // 对准指针的格索引 = round(normalizedRotation / arcDeg)
            const normalizedRotation = ((wheelRotation % 360) + 360) % 360;
            let selectedIndex = Math.round(normalizedRotation / wheelArcDeg);
            selectedIndex = Math.max(0, Math.min(wheelYears.length - 1, selectedIndex));

            selectedYear = wheelYears[selectedIndex];

            // 更新视觉高亮
            wheelYears.forEach((_, i) => {
                const path = document.getElementById(`seg-${i}`);
                const text = document.getElementById(`txt-${i}`);
                if (path) {
                    path.classList.toggle('selected', i === selectedIndex);
                }
                if (text) {
                    text.classList.toggle('selected', i === selectedIndex);
                }
            });

            // 更新中间显示
            const display = document.getElementById('selected-year-display');
            if (display) display.textContent = selectedYear;

            // 启用确认按钮
            const confirmBtn = document.getElementById('year-confirm-btn');
            if (confirmBtn) {
                confirmBtn.classList.add('active');
                confirmBtn.onclick = () => {
                    answers[0] = selectedYear;
                    nextHint.classList.remove('show');
                    setTimeout(() => goToNext(), 300);
                };
            }
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function handleOptionClick(e) {
            if (isAnimating) return;
            if (isDragging) return;

            const btn = e.target.closest('.option');
            if (!btn) return;

            const slide = btn.closest('.slide-page');
            const slideIndex = parseInt(slide.dataset.index);

            // 同一题内取消其他选中
            slide.querySelectorAll('.option').forEach(opt => opt.classList.remove('selected'));

            const optionIndex = parseInt(btn.dataset.option);

            // toggle
            if (selectedOption === optionIndex) {
                selectedOption = -1;
            } else {
                selectedOption = optionIndex;
                btn.classList.add('selected');
            }

            // 如果点击的是当前页
            if (slideIndex === current) {
                // 非最后一题：选完后自动翻到下一页
                if (current < questions.length - 1 && selectedOption >= 0) {
                    nextHint.classList.remove('show');
                    setTimeout(() => {
                        if (selectedOption >= 0) goToNext();
                    }, 300);
                } else {
                    updateHint();
                }
            }
        }

        function updateHint() {
            if (current === questions.length - 1) {
                // 最后一题
                if (selectedOption >= 0) {
                    nextHint.innerHTML = '<button class="view-result-btn" onclick="goToResult()">查看结果</button>';
                    nextHint.classList.add('show');
                } else {
                    nextHint.classList.remove('show');
                }
            } else {
                // 非最后一题
                if (selectedOption >= 0 || current === 0) { // Q1用selectedYear
                    nextHint.innerHTML = `
                        <div class="next-hint-text">滑动翻页</div>
                        <div class="next-arrow"><span>→</span></div>
                    `;
                    nextHint.classList.add('show');
                } else {
                    nextHint.classList.remove('show');
                }
            }
        }

        function updateUI() {
            // 更新滑动位置
            slideContainer.style.transform = `translateX(${-current * 100}%)`;
            
            // Q1特殊处理
            if (current === 0) {
                selectedOption = -1; // Q1不用selectedOption
                nextHint.classList.remove('show');
            } else {
                // 重置选中状态
                selectedOption = answers[current] !== undefined ? answers[current] : -1;

                // 更新选项选中状态
                const currentSlide = slideContainer.children[current];
                if (currentSlide) {
                    currentSlide.querySelectorAll('.option').forEach(opt => {
                        if (parseInt(opt.dataset.option) === selectedOption) {
                            opt.classList.add('selected');
                        } else {
                            opt.classList.remove('selected');
                        }
                    });
                }
                updateHint();
            }
        }

        // ========== 滑动翻页 ==========
        function goToNext() {
            if (isAnimating) return;
            if (current >= questions.length - 1) return;
            
            // Q1需要selectedYear
            if (current === 0 && !selectedYear) return;
            
            // 非Q1需要selectedOption
            if (current > 0 && selectedOption < 0) return;
            
            isAnimating = true;

            answers[current] = current === 0 ? selectedYear : selectedOption;
            if (current === 0) answers.__wheelRotation = wheelRotation;
            current++;
            selectedOption = -1;

            slideContainer.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            slideContainer.style.transform = `translateX(${-current * 100}%)`;

            setTimeout(() => {
                isAnimating = false;
                selectedOption = answers[current] !== undefined ? answers[current] : -1;
                
                // 如果是最后一题
                if (current === questions.length - 1) {
                    selectedOption = answers[current] !== undefined ? answers[current] : -1;
                }
                
                updateHint();
            }, 400);
        }

        function goToPrev() {
            if (isAnimating || current <= 0) return;
            isAnimating = true;

            current--;
            selectedOption = answers[current] !== undefined ? answers[current] : -1;
            if (current === 0) {
                selectedYear = answers[0];
                // 恢复轮盘旋转
                wheelRotation = answers.__wheelRotation || 0;
                setTimeout(() => {
                    const rotatable = document.getElementById('wheel-rotatable');
                    if (rotatable) {
                        rotatable.style.transformOrigin = '150px 140px';
                        rotatable.style.transform = `rotate(${wheelRotation}deg)`;
                    }
                    updateWheelSelection();
                }, 50);
            }

            slideContainer.style.transition = 'transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94)';
            slideContainer.style.transform = `translateX(${-current * 100}%)`;

            setTimeout(() => {
                isAnimating = false;
                updateHint();
            }, 400);
        }

        function goToResult() {
            if (isAnimating) return;
            if (selectedOption < 0) return;
            
            isAnimating = true;
            answers[current] = selectedOption;

            // 隐藏答题页，显示结果页
            questionPage.classList.remove('active');

            setTimeout(() => {
                const resultPage = document.getElementById('result-page');
                resultPage.classList.add('active');

                // 计算结果
                const result = calculateResult();
                
                document.getElementById('result-type').textContent = result.emoji;
                document.getElementById('result-title').textContent = result.title;
                document.getElementById('result-desc').textContent = result.desc;

                const tagsContainer = document.getElementById('result-tags');
                tagsContainer.innerHTML = '';
                result.tags.forEach((t, i) => {
                    const tag = document.createElement('span');
                    tag.className = 'result-tag';
                    tag.textContent = '# ' + t;
                    tag.style.animationDelay = `${0.5 + i * 0.1}s`;
                    tagsContainer.appendChild(tag);
                });

                isAnimating = false;
            }, 300);
        }

        // ========== 分类逻辑 ==========
        function calculateResult() {
            // answers数组: [0]=年份, [1]=性别, [2]=Q3, [3]=Q4, [4]=Q5, [5]=Q6, [6]=Q7, [7]=Q8, [8]=Q9, [9]=Q10
            
            const birthYear = answers[0]; // 年份
            const q3 = answers[2]; // 适应策略
            const q4 = answers[3]; // 社交1
            const q5 = answers[4]; // 社交2
            const q6 = answers[5]; // 精神状态1
            const q7 = answers[6]; // 精神状态2
            const q8 = answers[7]; // 抽象1
            const q9 = answers[8]; // 抽象2
            const q10 = answers[9]; // 抽象3

            // 计算年龄
            const currentYear = 2026;
            const age = currentYear - birthYear;

            // A维度：焦虑阶段（16~21岁A1，22~24岁A2，25~30岁A3）
            let aType = 'A1';
            if (age >= 22 && age <= 24) aType = 'A2';
            else if (age >= 25 && age <= 30) aType = 'A3';

            // B维度：适应策略（Q3直接决定：A→B1，B→B2，C→B3）
            let bType = 'B1';
            if (q3 === 1) bType = 'B2';
            else if (q3 === 2) bType = 'B3';

            // C维度：社交倾向（Q4+Q5评分：A=3，B=2，C=1，≥4分→C1外向，<4分→C2内向）
            const cScore = getScore(q4) + getScore(q5);
            const cType = cScore >= 4 ? 'C1' : 'C2';

            // D维度：未来预测
            const dScore = getScore(q6) + getScore(q7);
            let dType = 'D1'; // 默认积极型

            if (dScore < 4) {
                // 小于4分 → 转折型D2
                dType = 'D2';
            } else {
                // 大于等于4分，按Q8~Q10的C选项数量决定
                const cCount = [q8, q9, q10].filter(q => q === 2).length;
                if (cCount === 0) dType = 'D1'; // 0个C → D1积极型
                else if (cCount === 1) dType = 'D4'; // 1个C → D4嘉豪型
                else if (cCount === 2) dType = 'D3'; // 2个C → D3天选之人
                else if (cCount === 3) dType = 'D5'; // 3个C → D5傻福型
            }

            // 组合画像
            const profileKey = `${aType}${bType}${cType}`;
            const profile = profileModules[profileKey] || profileModules['A1B1C1'];
            const prediction = predictions[dType];

            return {
                emoji: profile.emoji,
                title: `${profile.title} ${prediction.title}`,
                desc: `${profile.desc}\n\n${prediction.desc}`,
                tags: [...new Set([...profile.tags, ...prediction.tags])]
            };
        }

        // 选项分数：A=3, B=2, C=1
        function getScore(optionIndex) {
            if (optionIndex === 0) return 3; // A选项
            if (optionIndex === 1) return 2; // B选项
            if (optionIndex === 2) return 1; // C选项
            return 1; // 默认
        }

        // ========== 触摸事件 ==========
        questionPage.addEventListener('touchstart', (e) => {
            if (isAnimating) return;
            
            const target = e.target;
            isTouchOnOption = target.closest('.option') !== null || target.closest('.wheel-segment') !== null;
            
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            touchCurrentX = touchStartX;
            dragStartTime = Date.now();
            hasMoved = false;
            isDragging = true;

            slideContainer.style.transition = 'none';
        }, { passive: true });

        questionPage.addEventListener('touchmove', (e) => {
            if (!isDragging || isAnimating || isTouchOnOption) return;

            const currentX = e.touches[0].clientX;
            const currentY = e.touches[0].clientY;
            const deltaX = currentX - touchStartX;
            const deltaY = currentY - touchStartY;

            if (!hasMoved) {
                if (Math.abs(deltaY) > Math.abs(deltaX) && Math.abs(deltaY) > 10) {
                    isDragging = false;
                    return;
                }
                hasMoved = true;
            }

            touchCurrentX = currentX;

            let offset = -current * window.innerWidth + deltaX;
            const maxLeft = -(questions.length - 1) * window.innerWidth;

            if (offset < maxLeft) {
                offset = maxLeft + (offset - maxLeft) * 0.3;
            }
            if (offset > 0) {
                offset = offset * 0.3;
            }

            slideContainer.style.transform = `translateX(${offset}px)`;
        }, { passive: true });

        questionPage.addEventListener('touchend', () => {
            if (!isDragging) return;
            isDragging = false;
            
            if (isTouchOnOption) {
                isTouchOnOption = false;
                return;
            }
            isTouchOnOption = false;

            const deltaX = touchCurrentX - touchStartX;
            const deltaTime = Date.now() - dragStartTime;
            const velocity = deltaTime > 0 ? Math.abs(deltaX) / deltaTime : 0;
            const threshold = window.innerWidth / 3;

            if (Math.abs(deltaX) < 15) {
                return;
            }

            if (current === questions.length - 1) {
                if (deltaX > threshold || (deltaX > 30 && velocity > 0.3)) {
                    goToPrev();
                } else {
                    snapBack();
                }
                return;
            }

            if (deltaX < -threshold || (deltaX < -50 && velocity > 0.4)) {
                if (current === 0 ? selectedYear : selectedOption >= 0) {
                    goToNext();
                } else {
                    snapBack();
                }
            } else if (deltaX > threshold || (deltaX > 50 && velocity > 0.4)) {
                goToPrev();
            } else {
                snapBack();
            }
        });

        function snapBack() {
            isAnimating = true;
            slideContainer.style.transition = 'transform 0.3s ease';
            slideContainer.style.transform = `translateX(${-current * 100}%)`;

            setTimeout(() => {
                isAnimating = false;
            }, 300);
        }

        // ========== 键盘支持 ==========
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') {
                if (current === 0 ? selectedYear : selectedOption >= 0 && current < questions.length - 1) {
                    goToNext();
                } else if (current === questions.length - 1 && selectedOption >= 0) {
                    goToResult();
                }
            } else if (e.key === 'ArrowLeft') {
                goToPrev();
            } else if (e.key === 'Enter' && (current === 0 ? selectedYear : selectedOption >= 0)) {
                if (current < questions.length - 1) {
                    goToNext();
                } else {
                    goToResult();
                }
            }
        });

        // ========== 分享 & 重试 ==========
        function shareResult() {
            const title = document.getElementById('result-title').textContent;
            const text = `🔮 刚测了「算命仙人」，我是${title}！\n\n你也来试试？👇\nhttps://israel-rain.github.io/suanming/`;

            if (navigator.share) {
                navigator.share({ title: '算命仙人', text });
            } else {
                navigator.clipboard.writeText(text).then(() => {
                    alert('已复制到剪贴板！快去朋友圈发吧~');
                });
            }
        }

        function retry() {
            const resultPage = document.getElementById('result-page');
            resultPage.classList.remove('active');
            questionPage.classList.remove('active');

            setTimeout(() => {
                document.getElementById('home-page').classList.remove('hidden');
            }, 300);
        }

        // ========== 窗口大小变化 ==========
        window.addEventListener('resize', () => {
            resizeCanvas();
            if (questionPage.classList.contains('active')) {
                slideContainer.style.transition = 'none';
                slideContainer.style.transform = `translateX(${-current * 100}%)`;
            }
        });
    </script>
</body>
</html>
